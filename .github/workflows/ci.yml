name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 pandoc ripgrep
      - name: Verify manifest and checksums
        run: python3 scripts/verify_manifest.py
      - name: Check Lua syntax
        run: find pandoc/data/filters -name '*.lua' -print0 | xargs -0 -n1 luac -p
      - name: Run Pandoc smoke test
        run: scripts/smoke-test.sh
