name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 pandoc ripgrep
      - name: Verify manifest and checksums
        run: python3 scripts/verify_manifest.py
      - name: Check Lua syntax
        run: find pandoc/data/filters -name '*.lua' -print0 | xargs -0 -n1 luac -p
      - name: Run Pandoc smoke test
        run: scripts/smoke-test.sh

  package:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build release archive twice
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            export OMNIDOC_RELEASE_TAG="$GITHUB_REF_NAME"
          fi
          scripts/package-release.sh dist-a
          scripts/package-release.sh dist-b
          cmp dist-a/*.tar.gz dist-b/*.tar.gz
          cmp dist-a/*.sha256 dist-b/*.sha256
      - name: Upload verified release bundle
        uses: actions/upload-artifact@v4
        with:
          name: omnidoc-libs-release
          path: dist-a/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: omnidoc-libs-release
          path: dist
      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --verify-tag \
              --generate-notes \
              --title "omnidoc-libs $GITHUB_REF_NAME"
          fi
