  "pandoc/data/filters/include-code-files.lua",
  "pandoc/data/filters/display-math.lua",
  "pandoc/data/filters/admonition.lua",
  "pandoc/data/templates/pantext.latex",
  "pandoc/crossref.yaml",
  "texmf/tex/common/omni.sty",
  "texmf/tex/common/omni-admonitions.sty",
  "texmf/tex/common/omni-engineering-book.sty",
]
